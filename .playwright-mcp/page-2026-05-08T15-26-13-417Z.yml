          - paragraph [ref=e3023]:
            - strong [ref=e3024]: "Chapter 64: Duel! The Strongest Intermediate Demon Battle"
          - paragraph [ref=e3025]: In the arena, the seductive succubus introduced both parties to the audience excitedly. After “Balrog”, Reka took a look at the VIP seat, he decided to have an empty-handed battle. He then told No. 64 5 words, “Are you ready to die?”
