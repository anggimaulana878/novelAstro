          - paragraph [ref=e3043]: "The Great Demon family had three basic talents: The first one was weapon expertise. They were good at using various weapons especially the scythe. That’s why they were also called the grim reaper."
          - paragraph [ref=e3044]: The second was teleportation. Chen Rui had already seen it during the Sky Battle. At that time, when Alan fell from the wyvern’s back and used teleportation in midair to safely return to the ground. The higher the level of Great Demon, the farther the effective distance of teleportation, and the shorter the cooldown of the skill.
