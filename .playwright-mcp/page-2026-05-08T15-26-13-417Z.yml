          - paragraph [ref=e9916]: The Illusive Demon Empire had been destroyed for many years. Leviathan Royal Family had since scattered around. 300 ago, Flandy was rescued by Red Spirit Lord, Josh when he was dying. In return, Flandy volunteered to assist Josh. Generally speaking, the royal families had their own dignity and pride. Even if the royal family was in dire situation, they would still choose to follow other royal families. Therefore, situations where they follow ordinary demons were rare.
