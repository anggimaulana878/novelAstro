          - paragraph [ref=e9890]: The three of them were all Chen Rui’s servants. Moreover, when Royce signed the master-slave contract, he said that he would offer the secret treasure. Thus, Chen Rui didn’t reject in a hypocritical manner, but asked, “What is this secret treasure? Why was your father unwilling to surrender?”
          - paragraph [ref=e9891]: “This secret treasure is a necklace called the Evil Blue Tear. It was the top secret treasure of the Breeze Shadow Empire’s Belphegor Royal Family beside the Breeze Shadow Boots. Thousands of years ago, after the Breeze Shadow Empire was destroyed by the Illusive Demon Empire, the Evil Blue Tear was lost. After a few twists and turns, it fell into my father, Khan’s hands by accident.”
          - paragraph [ref=e9892]: The Evil Blue Tear turned out to be the top secret treasure under the Belphegor Royal Family after the artifact, Breeze Shadow Boots! In other words, it was the lost treasure of Roman’s Sloth Royal Family. Chen Rui thought of Roman and asked curiously, “What’s with the Illusive Demon Empire?”
          - paragraph [ref=e9893]: “The Illusive Demon Empire was an empire established by the Leviathan Royal Family, named after the artifact, Illusive Demon Shield. The original 7 empires in the Demon Realm are named after artifacts, just like our Fallen Angel Empire used “Sword of Fallen Angel” as our name. About 9,000 years ago, the Leviathan Royal Family conquered the Breeze Shadow Empire and the Belphegor Royal Family disappeared subsequently. However, after 3000 years, the Illusive Demon Empire of the Leviathan Royal Family was again conquered by the Bloody Empire. After so many years, the 7 empires established by the ancestors of the 7 royal families have only 3 left.”
          - paragraph [ref=e9894]: It turned out that there were such grudges between the Leviathan Royal Family and Belphegor Royal Family. Chen Rui suddenly thought of Delia and Roman. They were born in rival royal families, and they actually became lovers. However, the grudges of the two empires were thousands of years ago. Everything was gone now, so there wasn’t the need to bother.
          - paragraph [ref=e9895]: Chen Rui was also curious about the artifacts of the 7 royal families. The artifacts that he knew now were the Sword of Fallen Angel of the Lucifer Royal Family, the Dark Shadow Cape of the Asmodeus Royal Family, the Illusive Demon Shield of the Leviathan Royal Family, the God-Eating Mask of the Beelzebub Royal Family and Breeze Shadow Boots of the Belphegor Royal Family. The five pieces of equipment were different. Together with the other two artifacts of the royal families, it seemed that they could be combined into a complete set of equipment.
          - paragraph [ref=e9896]: Chen Rui was about to ask questions regarding the artifacts of the other two royal families when he heard Royce continued to talk about the secret treasure, “This secret treasure is very magical as it can greatly enhance spirit in a short time. It can even hide the breath on the body so that others cannot see through your true strength. Yet, these are just its normal functions.”
          - paragraph [ref=e9897]: If it can be activated by Belphegor Royal Family’s blood, then it can exert its truly strong ability! It was said that after activation, the bloodline talent, <The Eye of Evil> of the Belphegor Royal Family could be greatly enhanced. They could also rely on the <The Eye of Evil> to encourage the mutation of ordinary demons. Yet, this mutation had a huge side effect that greatly reduces the recipient’s lifespan and the effect was far inferior from the devil fruit. It is mainly for the benefit of the next generation. Nevertheless, this secret treasure that can change the bloodline strength still has a fatal temptation to demons that aren’t part of the royal family…”
          - paragraph [ref=e9898]: Chen Rui nodded, “So the Evil Blue Tear has such function. However, speaking of this… what about your devil fruit? Why is your strength still not growing?”
