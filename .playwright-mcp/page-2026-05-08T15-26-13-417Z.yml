          - paragraph [ref=e9823]: “Yes.” Chen Rui vaguely guessed that Paglio was worried that he could not suppress the power he devoured. Indeed, the Super System also prompted that there was a danger of “overflow”, but now the Star Conversion mode had been activated, there was no need to worry. “However, today the grand master’s thoughts automatically cast a strange ability, which will gradually break down and digest these forces. All of which can gradually be converted into my own strength. It will take about 100 days, and my strength may improve by a huge leap.”
