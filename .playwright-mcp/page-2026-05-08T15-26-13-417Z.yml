          - paragraph [ref=e9902]: "Royce was excited: This isn’t a wild fruit but a treasure rare enough to wage wars! Although master may have devil fruits with him, everyone knows the yield and mature time of the fruit. Even if master has some, they are few in number. Master once exchange the devil fruit with Joseph for the Obsidian Heart and Vasasha. Yet, he still gives me another one unconditionally. In fact, this is the second one!"
