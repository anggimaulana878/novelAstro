          - paragraph [ref=e3046]: To Reka’s surprise, after using the demonic fire to enhance his strength, he was still unable to catch up with the speed of the opponent. On the other hand, his opponent actually didn’t pant or showed any sign of exhaustion after such a series of high-speed attacks.
          - paragraph [ref=e3047]: “If just looking solely on the speed,” Royce at the VIP seat put down his glass and looked appreciative, “No. 64 was close to the level of early Greater Demon. I truly don’t understand how he did he train to such extent. Reka’s victory might be difficult in this battle.”
          - paragraph [ref=e3048]: Arux didn’t say anything; his eyes faintly burned with inexplicable flames. Just a month ago, this No. 64 was just a powerless nobody. I never expect him to improve to such an extent in such a short period of time.
          - paragraph [ref=e3049]: Although he can only be regarded as a relatively strong nobody, there is still a month time. After a month, how much could Aguile grow? The Great Demon’s face had a strange smile. He then raised his head and downed the wine in the glass.
          - paragraph [ref=e3050]: “A guy who only evades. You don’t even have the courage to defend directly?” Reka sneered with disdain.
          - paragraph [ref=e3051]: Such a standard of provoking words truly suck. Chen Rui shook his head. He was too lazy to say anything. Instead, he reached out his hand and gestured Reka to come on. Such obvious provocative action was clearly more effective; the demonic fire on the angered Reka blazed stronger. He jumped and charged toward Chen Rui from above.
          - paragraph [ref=e3052]: This time, Chen Rui didn’t make use of his speed advantage to dodge. He adopted a defensive posture instead to actually face his opponent’s strength with his own weakness. A strange look appeared on Reka’s face; both of them collided instantly.
          - paragraph [ref=e3053]: The audience exclaimed and saw No. 64 reached out his hand. He actually blocked Reka’s violent, burning punch directly. His feet moved slightly to the back, then he held his body. “Ka!“, the slate beneath cracked again, showing the power of this punch.
          - paragraph [ref=e3054]: Chen Rui also punched without hesitation. Reka blocked the attack; his body also swayed slightly. It seemed that they were evenly matched. Subsequently, the two began to have a head-on match without any fancy moves; the dull fighting sound was endless.
          - paragraph [ref=e3055]: This fierce scene made everyone stunned. This cloaked, mysterious guy was not only amazingly fast, but his power could even rival Reka. The fighting sound continued; the thick and hard slates under their feet couldn’t stand the pressure and fragmented. It was not only the collision of power, but also the collision of willpower.
          - paragraph [ref=e3056]: That is what we called a battle! Coming to the arena today is definitely worth it. The audience was stirred up and cheered excitedly. The audience led by the cloaked demons cheered for No. 64 loudly while the other group cheered for Balrog. Their cheers were getting louder and louder.
