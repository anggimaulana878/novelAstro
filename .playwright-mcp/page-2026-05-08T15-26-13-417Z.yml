          - paragraph [ref=e3028]: If the gaze was a weapon, then both parties had already collided thousands of times in an instant. Reka’s gaze was like an erupting volcano, any move will be earth-shattering while No. 64 was as calm as a lake; his greatest power was hidden deep in the calmness.
