          - paragraph [ref=e3059]: "After listening to Royce’s comment at the side, Alan was even more confident: Fortunately, I sent Najib to threaten him, otherwise, Reka might really lose. This time I made a big bet; I can make a huge profit. That Aguile is quite a tactful guy, and he has decent strength. I can consider recruiting him to work for the Karon Family in the future."
          - paragraph [ref=e3060]: “A whetstone….?” Arux narrowed his eyes and answered himself. He seemed to understand Chen Rui’s true intention.
          - paragraph [ref=e3061]: Time passed by, but the rhythm of battle in the arena still did not slow down. However, both parties had begun to pant slightly. Reka initially wanted to rely on his endurance to exhaust his opponent, but he didn’t expect his opponent’s endurance was slightly above himself. In particular, the bravery of risking his life made “Balrog” secretly worried.
          - paragraph [ref=e3062]: After all, Reka was still the King of Intermediate Demons, so his strength was absolutely not a fluke. He knew it would be bad for him if this close-combat continued. He immediately shouted and punched toward Chen Rui with full force. When the two were blown away by each other’s strength, Reka used his teleportation and instantly appeared behind Chen Rui. He was covered in blazing flames. Both his hands formed a claw shape. Within his palm, a burning ball of light quickly formed, and it was launched toward Chen Rui.
