      - article [ref=e2962]:
        - heading "Chapter 63 - Must Lose! Alan’S Threat" [level=1] [ref=e2963]
        - generic [ref=e2964]:
          - paragraph [ref=e2965]: Days went by and it was late in the evening. Compared to the usual crowd, the audience at the arena almost doubled today. Such a scene hadn’t appeared during battles for a long time.
          - paragraph [ref=e2966]: The number of audience and the atmosphere excited the 2 centaurs of early Intermediate Demon battling on the stage. Their battle became fiercer and fiercer, but most people weren’t there to watch the battle between them. They were there for the next match instead. It was also the last exciting battle of the day; the two fighters were the “Balrog”, Reka and the mysterious No. 64.
          - paragraph [ref=e2967]: “Balrog” Reka; Great Demon; strongest Intermediate Demon in the arena; took part in more than 100 battles and had a 27 win streaks. He was definitely worthy of his title as the King of Intermediate Demon. Rumors said that he was one step away from Greater Demon, and it had been three months that no one dared to challenge him.
          - paragraph [ref=e2968]: Although No. 64 was previously unknown, his experience was miraculous. At present, it was only his third battle. In the first battle, he battled against “Bloody Hand”, Lance, an early-stage Intermediate Demon, he was once suppressed that he couldn’t even fight back. Subsequently, the situation was reversed after Lance used <Berserk> talent, then he managed to kill Lance. In the second battle, he battled against “Quick Wolf”, Jesse, the strongest among the middle-stage, he broke Jesse’s multiple fatal moves, and he eventually defeated Jesse. For some reason, he didn’t kill Jesse. In the third battle, No. 64 would be battling against Reka, the King of Intermediate Demons!
          - paragraph [ref=e2969]: The three battles of No. 64 were early-stage, middle-stage and high-stage of Intermediate Demon. There was huge leap from every battle. It all depended on whether he could create a miracle in the third battle!
          - paragraph [ref=e2970]: According to well-informed people, No. 64 was actually the leader of the newly-emerged organization, “Cloak Gang” at the Southeast Street, called Aguile. About half a month ago, Aguile went to the famous black merchant, Silva for trade, but Silva tried to rob and kill him. As a result, Aguile and Jesse swept the No. 4 street alone, killing Silva and the high-stage Intermediate Demon, Grau. Subsequently, the ancient house also became the new headquarters of Cloak Gang. Recently, many demons had joined the Cloak Gang; its momentum was getting bigger.
          - paragraph [ref=e2971]: That battle record made more audience being optimistic about No. 64, Aguile; the gambling odds of the two were actually not far apart.
          - paragraph [ref=e2972]: Arux was sitting at the VIP seats as usual. In addition to the lich, Keithahn, there were two more people at the seats as compared to previous matches. One of them was the sheriff, Alan; the other was a friend of Arux, one of the three scythes of Joseph, Royce.
          - paragraph [ref=e2973]: Arux and Royce were having their own conversation; they didn’t pay much attention to Alan. Alan tried to join the conversation, but he realized the two didn’t bother about him, so he felt embarrassed. However, he also understood for him to sit in the VIP seats together with two experienced Greater Great Demon was because of his identity as the Karon Family’s young master instead of his personal strength.
          - paragraph [ref=e2974]: Alan stopped embarrassing himself, but he sneered from time to time instead.
          - paragraph [ref=e2975]: In the arena’s preparation room, Chen Rui was cloaked and masked as usual. He listened to the lively cheers outside quietly. As compared with the tension and uneasiness before stepping foot into the arena for the first time during the Master Challenge, he was extremely calm now.
          - paragraph [ref=e2976]: It wasn’t just the improvement in strength, but also a change mentally.
          - paragraph [ref=e2977]: In the eyes of others, it was just half a month, but it had actually been more than three months for him who possessed the training ground. Besides, it was in a 4-folds gravity environment. The initial 70,000 auras had already been exhausted. In between the training, he converted twice the materials bought by the old dwarf using Silva’s money. He also had special training with Paglio in reality. The remaining aura was more than 50,000 auras. It wasn’t because he was reluctant to use, but he thought it wasn’t necessary.
          - paragraph [ref=e2978]: These three months of training had achieved remarkable results. 4-folds gravity was nothing to him already. During the last training ground practice, he even specially selected the forest scene. He jumped in the forest of gravity like it was plain ground. It was by no means a fluke as Chen Rui himself knew best about the pain and pressure he faced. Especially during the early stage, he was on the verge of life and death several times, but he finally made it through with his tenacious willpower.
          - paragraph [ref=e2979]: Under this constant endurance of spiritual self-transcendence, the limits of the body were also broke through again and again.
          - paragraph [ref=e2980]: In the 3-D human body in the status bar, the translucent bones and the muscles were all solidified from the light ball center of Alkaid state. It was integrated with the numerous fine filaments that was flowing in cycle. The Experience Value display had already become red, showing 100%.
          - paragraph [ref=e2981]: That data showed that his control of Star Power and the progress of <Refined Body> in the Alkaid state had reached a fully mature stage. He already had the basic conditions for breaking through to the next realm. However, he wasn’t sure how to trigger the evolution of the next star and enter the “Mizar” realm. Due to the time constraint, it wasn’t necessary to temporarily adapt to the 8-folds gravity. According to the poison dragon, even if the training intensity was increased, it would only train the body; the effect wouldn’t be great. He had to rely on actual combat to find the best breakthrough opportunity, .
          - paragraph [ref=e2982]: Therefore, Chen Rui was eagerly awaiting the arrival of this battle as it would probably be the key to break through the bottleneck. He seemed to be calm on the surface now, but he was very high-spirited in his heart. It was completely different from the cautiousness of battling against Jesse in the last battle.
          - paragraph [ref=e2983]: “No. 64? Sir Aguile?” A familiar voice sounded at the entrance.
          - paragraph [ref=e2984]: At this time, no one was supposed to be able to enter the preparation room. Chen Rui took a look and it was actually Alan’s subordinate, the lich, Najib. When he killed Silva and occupied the ancient house earlier, Najib came to investigate on behalf of Sheriff Alan. Finally, Cloak Gang’s doings at the ancient house was successfully accepted after bribing with some black crystal coins.
          - paragraph [ref=e2985]:
            - emphasis [ref=e2986]: What is this guy’s intention for coming to the preparation room so suddenly?
          - paragraph [ref=e2987]: “It is Sir Aguile indeed!” Najib was no stranger to this cloaked, masked man. Now it seemed that his strength was indeed horrifying as he dared to challenge Reka directly. Fortunately, Ganke and Najibdidn’t fall out with Aguile when they went to the Cloak Gang previously, “Sir, I came here was because of Sheriff Alan’s command; he wanted sir to promise one thing.”
          - paragraph [ref=e2988]:
            - emphasis [ref=e2989]: Alan? The trash-talking, pathetic man?
            - text: Chen Rui frowned, “What is it?”
          - paragraph [ref=e2990]: Najib tried his best to keep calm and said, “It’s like this. The incident of Cloak Gang killing Silva and occupying the ancient house is really troublesome and hard to settle. It is going to be reported to Princess Shea soon. Once Princess Shea sends the imperial guards to suppress, even Sir Alan can’t help the Cloak Gang.”
          - paragraph [ref=e2991]:
            - text: “Stop beating around the bush! Tell me straight!” Chen Rui sneered in his heart.
            - emphasis [ref=e2992]: These words could only be used to intimidate others. Whether it is Alan or Najib, they would never thought Aguile himself is Shea’s most trusted advisor. On the other hand, This Najib has just accepted a huge bribe, but he is falling out with me now, such a standard ungrateful demon.
          - paragraph [ref=e2993]: “Sir really is an understanding person.” Najib said with a smile, “Sir Alan can try to suppress this matter and officially recognize Cloak Gang’s position at the southeast block. The condition is simple, in this battle, Sir Aguile has to lose to Reka!”
          - paragraph [ref=e2994]:
            - emphasis [ref=e2995]: Faking result? A threat?
          - paragraph [ref=e2996]: Chen Rui snorted and Najib felt an invisible murderousness from the opponent. He was instantly terrified; his body shivered involuntarily.
          - paragraph [ref=e2997]: “Alan really think so highly of me that he thinks Reka will lose?” Chen Rui said coldly, “If I don’t agree, is Alan going to deal with me and Cloak Gang?”
          - paragraph [ref=e2998]: Najib explained in a stutter, “Please calm down sir. I am just a tiny fry who conveys the request of Sir Alan. It is pointless for sir to kill me. It’s like this. Reka has sworn loyalty to the Karon Family, so Sir Alan doesn’t want him to have any accidents. So, as long as sir agrees to fake your lose, there will not be any danger in the arena.”
          - paragraph [ref=e2999]: Finally, the murderous intentions slowly faded. Aguile’s hoarse voice sounded, “Since this is the case, tell Alan that I’ll make sure he’s satisfied.”
          - paragraph [ref=e3000]: Najib was finally relieved. He was afraid to lose his life by making Aguile angry, so he was like having an amnesty after listening to this. He said happily, “Thank you, sir! Najib won’t bother sir to prepare for the war! I’ll leave now!”
          - paragraph [ref=e3001]:
            - text: "Chen Rui saw Najib leave, and he sneered:"
            - emphasis [ref=e3002]: If it is the usual stuff, I might just give in. Now, I can’t lose the battle. Even without Arux’s threat, I’ll go all out to break through to the Mizar realm as soon as possible.
          - paragraph [ref=e3003]:
            - emphasis [ref=e3004]: That’s right, “Sir” Alan, I’ll make sure you’re “satisfied” by then.
          - paragraph [ref=e3005]: At present, the current battle ended with the death of a centaur. After a little cleaning up, the finale was finally staged with the magic amplifier.
          - paragraph [ref=e3006]: Under millions of eyes, the two parties competing appeared at the center of the arena.
          - paragraph [ref=e3007]: Reka was a very standard image of a Great Demon; a tall physique; red-skinned; 2 dark, curved horns on his head glowing faintly; he was filled with the demeanor that he might explode at any time.
          - paragraph [ref=e3008]: In contrast, No. 64, who was still in his mask and cloak, looked relatively thinner; his demeanor was rather low-keyed. He was much inferior compared to Reka’s appearance.
          - paragraph [ref=e3009]: Royce on the VIP table stared at No. 64 for a while, and his calm eyes showed a little praise. He smiled and said, “Arux, it seems that you have good insights. This No. 64 isn’t simple.”
          - paragraph [ref=e3010]: Although No. 64 didn’t look imposing on the surface, someone as strong as Royce could definitely tell that the physical and spiritual energy of No. 64 were already integrated into one. His restrained demeanor even though wasn’t obvious, but his impression toward others was not inferior to Reka.
          - paragraph [ref=e3011]: Arux’s eyes were also fixed on Aguile’s body. Surprised flashed past his eyes as he spoke to himself, “Peak of Intermediate Demon? It’s truly surprising but… very good!”
          - paragraph [ref=e3012]: “I thought it will be Reka’s solo performance again, but the result might be hard to tell based on the current situation.” Royce said thoughtfully, “If No. 64 is a Great Demon, then he is just in his regular form now. Once he uses his battle form, it is very likely that he’ll reach Greater Demon. If that’s the case, then Reka is in danger.”
          - paragraph [ref=e3013]: Arux’s eyes suddenly brightened. That’s right! In the two previous battles, Aguile had never used transformation!
          - paragraph [ref=e3014]: “Yet, this is not absolute,” Royce took a sip of wine gracefully and continued to comment, “Transformation doesn’t mean crossing realms. Many later-stage Great Demons still remain at later-stage after transformation; only their strength is enhanced. Besides, this guy might not necessarily be a Great Demon. He might be a descendant of a pathetic royal family.”
          - paragraph [ref=e3015]:
            - text: Arux recalled that Aguile once mentioned “deprived honor”, so it did seem possible. He was frowning and silenced at once, then he finally decided not to think about this.
            - emphasis [ref=e3016]: A battle is a battle. As long as I can truly enjoy the exciting battle, I don’t care whether he is a Great Demon or a royal family! This is me, Arux!
          - paragraph [ref=e3017]: Alan was a little scared listening at the side. Aguile looked ordinary, but he actually had the chance to defeat Reka. At that moment, he saw the lich, Najib appeared at the side of the VIP seats.
          - paragraph [ref=e3018]: Alan saw Najib’s gesture, and he felt a lot safer. He gave Najib a praising look and signaled Najib to make his bet immediately. Najib understood, and he quickly turned and went out.
