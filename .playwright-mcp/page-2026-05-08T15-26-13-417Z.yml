          - paragraph [ref=e9906]: The greatest function of the Evil Blue Tear was to enhance <The Eye of Evil>, which requires the blood of the Belphegor Royal Family to activate. Chen Rui obviously had no use of that function as he had <Camouflage>, and the function of hiding breath was useless too; what he needed was the ability to greatly improve his spirit because <Deep Analysis> needed spirit the most. With the Evil Blue Tear, he believed that the progress of decoding the “God-Eating Mask” would greatly increase.
          - paragraph [ref=e9907]: When Royce heard that, he left immediately and soon brought a space bracelet with samples of magic materials back. These materials were really high grade. Many could be converted into aura. Chen Rui made a list, added some irrelevant materials and then asked him to contact Joseph.
          - paragraph [ref=e9908]: Unsurprisingly, Joseph was surprised when he saw the quantities of materials that “Aguile” was asking for. However, the devil fruit was too important for him. Now that he was asking for help, he had to submit, so he asked Royce to follow suit.
