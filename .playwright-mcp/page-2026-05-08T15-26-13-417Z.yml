          - paragraph [ref=e9886]: The reason why Royce’s father, Khan, was killed by the Red Spirit Lord, Josh back then was because of this secret treasure. As the illegitimate son, Ledo exposed the secret, Josh wanted to take the item but failed. Therefore, he killed Khan and destroyed the Kunda Family. The whereabouts of the secret treasure also disappeared along the way with no traces left.
          - paragraph [ref=e9887]: In fact, the secret treasure’s clue was sealed into his son’s fiancée, Vasasha’s body by Khan with a secret bloodline technique. The condition for learning the clue was to “combine” Royce and Vasasha. Other than Royce, other men couldn’t find out even if they had sex with Vasasha. This secret was only known by Royce, not even Vasasha herself.
          - paragraph [ref=e9888]: Now that Royce said that the clues of the secret treasure were acquired, it meant that Royce and Vasasha had completed a certain life event. That was why Chen Rui deliberately gave a mocking smile.
