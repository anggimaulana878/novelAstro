      - article [ref=e3075]:
        - heading "Chapter 65 - Accident? Fired Toward The Vip Seats" [level=1] [ref=e3076]
        - generic [ref=e3077]:
          - paragraph [ref=e3078]: "Notes: Greater Demon that was used previously will change to Higher Demon due to the confusing term between Great Demon (race) and Greater Demon (rank). There is also an update that the chapter will be released on UTC +0 00:00. There will be some errors to schedule the release in novelupdates, so please give us some time to work around it."
          - paragraph [ref=e3079]: Reka had reached the later stage of Intermediate Demon 15 years ago, and he was one step before reaching Higher Demon. Yet, he had been stuck at this last step. For that reason, he trained everywhere, and he even joined the arena. He had been triumphant, and he became the king of Intermediate Demon in the arena.
          - paragraph [ref=e3080]: After becoming the King of Intermediate Demon in the arena, Reka began to change mentally as time passed. On the one hand, he enjoyed the support and generous rewards. On the other hand, a thought was breeding in his mind after several unsuccessful attempts to achieve Higher Demon. That was the fear of failing again, and the fear of losing the prestige and money that he had now. What’s more, even after breaking through to Higher Demon, he would need to face terrifying forces like Arux. The chance of survival was less than 10%.
          - paragraph [ref=e3081]: Arux was quite belligerent. The number of Higher Demon in the arena had always been small, so no one dared to challenge him basically. Therefore, Arux would arrange mandatory matches from time to time. If his opponents could endure up to the specified time limit, they would be heavily prized; if not, they would be killed on the spot. That was certainly a way to promote improvement, but it also caused panic at the same time.
          - paragraph [ref=e3082]: Ever since the last remaining Higher Demon in the arena died in Arux’s hands 4 months ago, the battles of Higher Demon had paused.
          - paragraph [ref=e3083]: Under the influence of these overall factors, Reka gradually weakened in his pursuit of victory at all costs. Instead, his laziness increased. 20 days ago, Arux specifically appointed Reka to deal with No. 64. Subsequently, he met the Karon Family’s Mikas. Under the Mikas’s invitation, Reka finally made up his mind to leave the arena and join the Karon Family after participating in this last battle.
          - paragraph [ref=e3084]: However, he encountered No. 64 who was a monster in his battle. Reka was best at his power and endurance. Yet, it was nothing in front of his opponent. Besides, his opponent had a terrifying speed. If this continued, he wouldn’t have any chance to win.
          - paragraph [ref=e3085]: Reka once defeated opponents who were evenly matched or even above his actual strength. If it were the Balrog five years ago, he would have fought with his life without fear. However, the current Reka had lost his fighting spirit and courage that he had before.
          - paragraph [ref=e3086]: “It seems that I have to return those words to you. Are you ready to die?” The hoarse voice behind the mask sounded, making Reka’s heart even more scared. He screamed and took the initiative to punch.
          - paragraph [ref=e3087]: However, Chen Rui could tell that that punch was only strong in appearance but weak in reality. He reached out his hand and grabbed Reka’s fist.
          - paragraph [ref=e3088]: As he approached, Reka lowered his voice and said, “I am part of the Karon Family! You dare to kill me? Aren’t you afraid of offending the Karon Family?”
