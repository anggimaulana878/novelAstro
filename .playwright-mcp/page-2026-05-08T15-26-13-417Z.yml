          - paragraph [ref=e3041]: As Reka was retreating, then “Poom!“, a red flame appeared on his body, and he disappeared instantly. Chen Rui missed a hit; Reka appeared behind him at the same time. A burning fist launched out instantly; Reka launched his first counterattack finally.
